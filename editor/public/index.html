<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenSoloMakersKits Editor</title>
    <meta name="description" content="OpenSoloMakersKits のスキルを見つけて、入力し、生成物を確認するローカル dashboard です。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="editor-dashboard-page">
    <header class="dashboard-topbar">
      <div class="dashboard-topbar__inner">
        <a class="dashboard-brand" href="./" aria-label="OpenSoloMakersKits Editor">
          <span class="dashboard-brand__mark">OS</span>
          <span>OpenSoloMakersKits</span>
        </a>
        <nav class="dashboard-topbar__nav" aria-label="Site navigation">
          <a href="https://open.solo-makers-kits.com/" target="_blank" rel="noreferrer">サイトへ</a>
        </nav>
      </div>
    </header>

    <div class="dashboard-notice">
      <span>local editor</span>
      <strong data-server-status>loading</strong>
    </div>

    <main class="dashboard-shell">
      <section class="project-overview" aria-label="Editor overview">
        <div class="project-overview__copy">
          <p class="dashboard-kicker">editor</p>
          <h1>OpenSoloMakersKits Editor</h1>
          <p data-home-concept>スキルを読み込み中です。</p>
        </div>
        <div class="project-overview__stats">
          <div class="project-thumb">
            <img data-hero-image src="/assets/skills/gen-feed-posts/thumbnail-youtube.png" alt="" />
          </div>
          <div>
            <span>Skills</span>
            <strong data-count="skills">-</strong>
          </div>
          <div>
            <span>Bundles</span>
            <strong data-count="bundles">-</strong>
          </div>
          <div>
            <span>Runs</span>
            <strong data-count="runs">-</strong>
          </div>
        </div>
      </section>

      <nav class="dashboard-tabs" aria-label="Editor sections">
        <button class="is-active" type="button" data-tab-button="skills">Skills</button>
        <button type="button" data-tab-button="editor">Editor</button>
      </nav>

      <section class="dashboard-panel is-active" data-tab-panel="skills">
        <div class="panel-heading">
          <h2>Skills</h2>
        </div>
        <div class="skills-layout">
          <div class="skill-list" data-skill-list></div>
        </div>
      </section>

      <section class="dashboard-panel" data-tab-panel="editor">
        <div class="panel-heading">
          <div class="editor-heading">
            <h2>Editor</h2>
            <label>
              <span>Skill</span>
              <select data-editor-skill-select></select>
            </label>
          </div>
          <button class="dashboard-primary" type="button" data-run-skill>実行</button>
        </div>

        <div class="editor-media-grid" data-editor-media>
          <article class="editor-media-card">
            <div class="editor-media-card__head">
              <span>Thumbnail</span>
              <strong>サムネイル画像</strong>
            </div>
            <img data-editor-thumbnail src="" alt="" />
          </article>
          <article class="editor-media-card editor-media-card--video">
            <div class="editor-media-card__head">
              <span>YouTube</span>
              <strong>動画</strong>
            </div>
            <iframe
              data-editor-youtube
              title="Skill YouTube video"
              src=""
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </article>
        </div>

        <section class="editor-output-panel" data-editor-output hidden>
          <div class="editor-output-panel__head">
            <div class="editor-output-panel__title">
              <span data-output-type></span>
              <strong data-output-title></strong>
            </div>
            <button class="output-copy-button" type="button" data-copy-output hidden aria-label="結果をコピー" title="結果をコピー">
              <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                <rect x="8" y="8" width="10" height="12" rx="2"></rect>
                <path d="M6 16H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              <span class="visually-hidden">結果をコピー</span>
            </button>
          </div>
          <div class="editor-output-panel__body" data-output-content></div>
        </section>
      </section>
    </main>

    <template id="skill-card-template">
      <button class="skill-card" type="button" data-skill-select>
        <span class="skill-card__main">
          <img data-skill-image src="" alt="" />
          <strong data-skill-title></strong>
          <p data-skill-description></p>
        </span>
        <span class="skill-card__footer">
          <small data-card-target></small>
          <span class="skill-card__action">Editorへ</span>
        </span>
      </button>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
