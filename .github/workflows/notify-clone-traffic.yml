name: Notify clone traffic

on:
  schedule:
    # Runs around midnight in Japan Standard Time (15:00 UTC).
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    name: Send clone count to Discord
    runs-on: ubuntu-latest

    steps:
      - name: Fetch GitHub clone traffic and notify Discord
        env:
          DISCORD_THREAD_ID: "1514891706376650773"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # If github.token cannot read traffic, set GH_TRAFFIC_TOKEN to a
          # fine-grained token with Administration: read for this repository.
          GH_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN || github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [[ -z "${DISCORD_WEBHOOK_URL}" ]]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set."
            exit 1
          fi

          api_url="https://api.github.com/repos/${REPOSITORY}/traffic/clones"
          http_code="$(
            curl -sS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -o clones.json \
              -w "%{http_code}" \
              "${api_url}"
          )"

          if [[ "${http_code}" -lt 200 || "${http_code}" -ge 300 ]]; then
            error_body="$(jq -r '.message // .' clones.json 2>/dev/null || cat clones.json)"
            content="$(
              jq -rn \
                --arg repo "${REPOSITORY}" \
                --arg code "${http_code}" \
                --arg error "${error_body}" \
                --arg run_url "${RUN_URL}" \
                '"GitHub clone traffic fetch failed for `" + $repo + "`.\nHTTP: " + $code + "\nError: " + $error + "\nRun: " + $run_url'
            )"
          else
            total_count="$(jq -r '.count // 0' clones.json)"
            total_uniques="$(jq -r '.uniques // 0' clones.json)"
            latest_day="$(jq -r '(.clones // []) | sort_by(.timestamp) | last | .timestamp[0:10] // "n/a"' clones.json)"
            latest_count="$(jq -r '(.clones // []) | sort_by(.timestamp) | last | .count // 0' clones.json)"
            latest_uniques="$(jq -r '(.clones // []) | sort_by(.timestamp) | last | .uniques // 0' clones.json)"

            content="$(
              jq -rn \
                --arg repo "${REPOSITORY}" \
                --arg total_count "${total_count}" \
                --arg total_uniques "${total_uniques}" \
                --arg latest_day "${latest_day}" \
                --arg latest_count "${latest_count}" \
                --arg latest_uniques "${latest_uniques}" \
                --arg run_url "${RUN_URL}" \
                '"GitHub clone traffic for `" + $repo + "`\nLast 14 days: " + $total_count + " clones (" + $total_uniques + " unique)\nLatest daily bucket (" + $latest_day + " UTC): " + $latest_count + " clones (" + $latest_uniques + " unique)\nRun: " + $run_url'
            )"
          fi

          webhook_url="${DISCORD_WEBHOOK_URL}"
          separator="?"
          if [[ "${webhook_url}" == *"?"* ]]; then
            separator="&"
          fi

          payload="$(jq -n --arg content "${content}" '{content: $content}')"
          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            --data "${payload}" \
            "${webhook_url}${separator}thread_id=${DISCORD_THREAD_ID}"

          if [[ "${http_code}" -lt 200 || "${http_code}" -ge 300 ]]; then
            exit 1
          fi
